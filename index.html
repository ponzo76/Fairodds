  <title>FairOdds</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #080c0a; --bg2: #060a07; --border: #1a2e22;
      --green: #3dff7a; --green-mid: #4a7a5a; --muted: #90d4a8;
      --red: #ff5050; --orange: #cc7020; --text: #a8c5b0;
      --font: 'Courier New', 'Lucida Console', monospace;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100dvh; display: flex; flex-direction: column; overscroll-behavior: none;
    }

    .header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
      padding-top: max(14px, env(safe-area-inset-top));
    }
    .header-title { font-size: 18px; letter-spacing: 4px; color: var(--green); font-weight: bold; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: bold; letter-spacing: 2px; }
    .clear-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: var(--font); font-size: 11px; letter-spacing: 2px;
      padding: 7px 13px; cursor: pointer; font-weight: bold;
    }
    .clear-btn:active { opacity: 0.7; }

    .input-section { padding: 24px 16px; border-bottom: 1px solid var(--border); }
    .section-label { font-size: 12px; letter-spacing: 3px; color: var(--muted); margin-bottom: 16px; font-weight: bold; }

    .odds-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 0; }
    .odds-field { display: flex; flex-direction: column; gap: 8px; }
    .odds-tag { font-size: 13px; letter-spacing: 2px; font-weight: bold; text-align: center; }
    .tag-1 { color: var(--green); }
    .tag-x { color: var(--orange); }
    .tag-2 { color: var(--red); }

    .odds-input {
      width: 100%; background: #0a110d; border: 1px solid var(--border); color: var(--text);
      font-family: var(--font); font-size: 22px; padding: 12px 8px; outline: none;
      text-align: center; border-radius: 0; -webkit-appearance: none; font-weight: bold;
      transition: border-color 0.15s, color 0.15s;
    }
    .odds-input.filled-1 { border-color: var(--green); color: var(--green); }
    .odds-input.filled-x { border-color: var(--orange); color: var(--orange); }
    .odds-input.filled-2 { border-color: var(--red); color: var(--red); }

    .aggio-bar { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .aggio-label { font-size: 12px; letter-spacing: 3px; color: var(--muted); font-weight: bold; }
    .aggio-value { font-size: 20px; font-weight: bold; }
    .aggio-low { color: var(--green); }
    .aggio-mid { color: var(--orange); }
    .aggio-high { color: var(--red); }

    .results-section { padding: 24px 16px; flex: 1; }
    .results-label { font-size: 12px; letter-spacing: 3px; color: var(--muted); margin-bottom: 16px; font-weight: bold; }

    .result-card {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 16px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-card.highlighted { border-color: var(--green); background: rgba(61,255,122,0.04); }
    .result-left { display: flex; flex-direction: column; gap: 4px; }
    .result-sign { font-size: 13px; letter-spacing: 2px; font-weight: bold; }
    .result-sign-1 { color: var(--green); }
    .result-sign-x { color: var(--orange); }
    .result-sign-2 { color: var(--red); }
    .result-desc { font-size: 11px; color: var(--muted); font-weight: bold; letter-spacing: 1px; }
    .result-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .result-fair { font-size: 28px; font-weight: bold; color: var(--text); }
    .result-exchange { font-size: 18px; font-weight: bold; color: var(--green); }
    .result-prob { font-size: 11px; color: var(--muted); font-weight: bold; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 16px; gap: 12px; opacity: 0.5;
    }
    .empty-triangle { font-size: 48px; color: var(--green); }
    .empty-text { font-size: 12px; letter-spacing: 3px; color: var(--muted); font-weight: bold; text-align: center; }

    .exchange-note {
      margin: 0 16px 16px; padding: 12px 14px;
      border: 1px solid #1a3a22; background: rgba(61,255,122,0.03);
      font-size: 11px; color: var(--muted); font-weight: bold; letter-spacing: 1px; line-height: 1.6;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">FairOdds</div>
    <div class="header-sub">CALCOLATORE 1X2</div>
  </div>
  <button class="clear-btn" onclick="clearAll()">RESET</button>
</div>

<!-- INPUT -->
<div class="input-section">
  <div class="section-label">QUOTE SHARP BOOK</div>
  <div class="odds-row">
    <div class="odds-field">
      <div class="odds-tag tag-1">1</div>
      <input class="odds-input" id="q1" type="number" inputmode="decimal"
        step="0.01" min="1.01" placeholder="—" oninput="calculate()" />
    </div>
    <div class="odds-field">
      <div class="odds-tag tag-x">X</div>
      <input class="odds-input" id="qx" type="number" inputmode="decimal"
        step="0.01" min="1.01" placeholder="—" oninput="calculate()" />
    </div>
    <div class="odds-field">
      <div class="odds-tag tag-2">2</div>
      <input class="odds-input" id="q2" type="number" inputmode="decimal"
        step="0.01" min="1.01" placeholder="—" oninput="calculate()" />
    </div>
  </div>
</div>

<!-- AGGIO -->
<div class="aggio-bar">
  <div class="aggio-label">AGGIO BOOK</div>
  <div class="aggio-value" id="aggio">—</div>
</div>

<!-- RESULTS -->
<div class="results-section">
  <div class="section-label">FAIR ODDS</div>

  <div id="empty-state" class="empty-state">
    <div class="empty-triangle">Δ</div>
    <div class="empty-text">INSERISCI LE<br/>QUOTE SHARP</div>
  </div>

  <div id="results" style="display:none">
    <div class="result-card" id="card-1">
      <div class="result-left">
        <div class="result-sign result-sign-1">SEGNO 1</div>
        <div class="result-desc">FAIR ODD</div>
      </div>
      <div class="result-right">
        <div class="result-fair" id="fair-1">—</div>
        <div class="result-prob" id="prob-1">—</div>
      </div>
    </div>

    <div class="result-card highlighted" id="card-1x">
      <div class="result-left">
        <div class="result-sign result-sign-1">SEGNO 1</div>
        <div class="result-desc">+ 5% EXCHANGE</div>
      </div>
      <div class="result-right">
        <div class="result-exchange" id="exchange-1">—</div>
        <div class="result-prob" id="prob-1x">TARGET MINIMO</div>
      </div>
    </div>

    <div class="result-card" id="card-x">
      <div class="result-left">
        <div class="result-sign result-sign-x">SEGNO X</div>
        <div class="result-desc">FAIR ODD</div>
      </div>
      <div class="result-right">
        <div class="result-fair" id="fair-x">—</div>
        <div class="result-prob" id="prob-x">—</div>
      </div>
    </div>

    <div class="result-card" id="card-2">
      <div class="result-left">
        <div class="result-sign result-sign-2">SEGNO 2</div>
        <div class="result-desc">FAIR ODD</div>
      </div>
      <div class="result-right">
        <div class="result-fair" id="fair-2">—</div>
        <div class="result-prob" id="prob-2">—</div>
      </div>
    </div>
  </div>

  <div id="exchange-note" class="exchange-note" style="display:none">
    ▲ Entra sul segno 1 all'exchange solo se la quota disponibile è ≥ al valore evidenziato in verde.
  </div>
</div>

<script>
  function calculate() {
    const q1 = parseFloat(document.getElementById('q1').value);
    const qx = parseFloat(document.getElementById('qx').value);
    const q2 = parseFloat(document.getElementById('q2').value);

    document.getElementById('q1').className = 'odds-input' + (q1 > 1 ? ' filled-1' : '');
    document.getElementById('qx').className = 'odds-input' + (qx > 1 ? ' filled-x' : '');
    document.getElementById('q2').className = 'odds-input' + (q2 > 1 ? ' filled-2' : '');

    if (!q1 || !qx || !q2 || q1 <= 1 || qx <= 1 || q2 <= 1) {
      document.getElementById('aggio').textContent = '—';
      document.getElementById('aggio').className = 'aggio-value';
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('results').style.display = 'none';
      document.getElementById('exchange-note').style.display = 'none';
      return;
    }

    const p1 = 1 / q1;
    const px = 1 / qx;
    const p2 = 1 / q2;
    const total = p1 + px + p2;

    const aggio = ((total - 1) * 100);
    const aggioEl = document.getElementById('aggio');
    aggioEl.textContent = aggio.toFixed(2) + '%';
    aggioEl.className = 'aggio-value ' + (aggio < 3 ? 'aggio-low' : aggio < 6 ? 'aggio-mid' : 'aggio-high');

    const fp1 = p1 / total;
    const fpx = px / total;
    const fp2 = p2 / total;

    const fq1 = 1 / fp1;
    const fqx = 1 / fpx;
    const fq2 = 1 / fp2;

    const exchangeTarget = fq1 / 0.95;

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('exchange-note').style.display = 'block';

    document.getElementById('fair-1').textContent = fq1.toFixed(2);
    document.getElementById('prob-1').textContent = (fp1 * 100).toFixed(1) + '% prob.';

    document.getElementById('exchange-1').textContent = exchangeTarget.toFixed(2);

    document.getElementById('fair-x').textContent = fqx.toFixed(2);
    document.getElementById('prob-x').textContent = (fpx * 100).toFixed(1) + '% prob.';

    document.getElementById('fair-2').textContent = fq2.toFixed(2);
    document.getElementById('prob-2').textContent = (fp2 * 100).toFixed(1) + '% prob.';
  }

  function clearAll() {
    ['q1','qx','q2'].forEach(id => {
      document.getElementById(id).value = '';
      document.getElementById(id).className = 'odds-input';
    });
    calculate();
  }
</script>

</body>
</html>
