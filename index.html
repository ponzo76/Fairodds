<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual">
<title>Diario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0b09;--surface:#131210;--surface-2:#1a1915;--surface-3:#22201c;
  --border:#272420;--border-2:#312e29;
  --text:#e6dfd6;--text-2:#978f86;--text-3:#4e4a45;
  --accent:#c5a35e;--accent-dim:rgba(197,163,94,.13);--accent-glow:rgba(197,163,94,.28);
  --red:#c55e5e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:-webkit-fill-available}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;min-height:-webkit-fill-available}

/* HEADER */
header{display:flex;align-items:center;gap:14px;padding:0 20px;height:50px;border-bottom:1px solid var(–border);background:var(–surface);flex-shrink:0;z-index:10}
.logo{font-family:‘Cormorant Garamond’,serif;font-size:20px;font-weight:300;letter-spacing:.1em;white-space:nowrap}
.logo em{color:var(–accent);font-style:italic}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
#searchInput{width:100%;background:var(–surface-2);border:1px solid var(–border);border-radius:8px;padding:7px 12px 7px 32px;color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:16px;outline:none;transition:border-color .2s}
#searchInput:focus{border-color:var(–border-2)}
#searchInput::placeholder{color:var(–text-3)}
.spacer{flex:1}
.view-tabs{display:flex;gap:3px;background:var(–surface-2);border-radius:8px;padding:3px}
.vtab{padding:4px 13px;border-radius:6px;border:none;background:transparent;color:var(–text-3);font-family:‘DM Sans’,sans-serif;font-size:11px;letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.vtab.active{background:var(–surface-3);color:var(–text)}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{width:210px;flex-shrink:0;border-right:1px solid var(–border);background:var(–surface);display:flex;flex-direction:column;overflow:hidden}
.cal-wrap{padding:16px 12px 12px;border-bottom:1px solid var(–border)}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-label{font-family:‘Cormorant Garamond’,serif;font-size:14px;font-weight:400;color:var(–text);letter-spacing:.05em}
.cal-nav{background:none;border:none;color:var(–text-3);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;transition:color .2s;line-height:1}
.cal-nav:hover{color:var(–text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-wd{text-align:center;font-size:9px;color:var(–text-3);letter-spacing:.1em;text-transform:uppercase;padding:2px 0 5px}
.cd{text-align:center;padding:4px 1px;font-size:11px;color:var(–text-3);cursor:pointer;border-radius:5px;transition:all .15s;position:relative}
.cd:hover:not(.empty){background:var(–surface-2);color:var(–text)}
.cd.today{color:var(–accent)}
.cd.selected{background:var(–accent-dim);color:var(–accent)}
.cd.has-e::after{content:’’;position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(–accent);opacity:.5}
.cd.empty{cursor:default}

.sidebar-scroll{flex:1;overflow-y:auto;padding:12px 8px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:7px;margin-top:4px}
.sec-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(–text-3)}
.sec-btn{background:none;border:none;color:var(–text-3);font-size:10px;cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .2s;font-family:‘DM Sans’,sans-serif}
.sec-btn:hover{color:var(–text-2);background:var(–surface-2)}
.nav-item{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:7px;cursor:pointer;transition:background .15s;margin-bottom:1px}
.nav-item:hover{background:var(–surface-2)}
.nav-item.active{background:var(–surface-3)}
.nav-icon{font-size:13px;line-height:1;flex-shrink:0}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin:1px 0}
.nav-name{font-size:12px;color:var(–text-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item.active .nav-name{color:var(–text)}
.nav-count{font-size:10px;color:var(–text-3);font-variant-numeric:tabular-nums}
.tags-cloud{padding:2px 4px;display:flex;flex-wrap:wrap}
.tag-chip-sm{display:inline-flex;align-items:center;background:var(–surface-2);border:1px solid var(–border);border-radius:5px;padding:3px 8px;font-size:10px;color:var(–text-2);cursor:pointer;transition:all .2s;margin:2px}
.tag-chip-sm:hover,.tag-chip-sm.active{background:var(–accent-dim);border-color:var(–accent);color:var(–accent)}

.sidebar-footer{padding:10px 8px;border-top:1px solid var(–border);display:flex;gap:6px}
.sfbtn{flex:1;background:none;border:1px solid var(–border);color:var(–text-3);font-family:‘DM Sans’,sans-serif;font-size:10px;padding:5px 4px;border-radius:6px;cursor:pointer;transition:all .2s;text-align:center}
.sfbtn:hover{border-color:var(–border-2);color:var(–text-2)}
#importFile{display:none}

/* MAIN */
main{flex:1;overflow-y:auto;padding:28px 32px;position:relative}

/* Day view */
.day-hd{margin-bottom:26px}
.day-eyebrow{font-size:10px;color:var(–text-3);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
.day-big{display:flex;align-items:flex-end;gap:10px;font-family:‘Cormorant Garamond’,serif;font-weight:300;line-height:1}
.day-num{font-size:76px;color:transparent;background:linear-gradient(160deg,var(–accent) 0%,rgba(197,163,94,.25) 100%);-webkit-background-clip:text;background-clip:text;line-height:.85}
.day-rest{font-size:36px;color:var(–text)}
.day-rest em{display:block;font-size:14px;color:var(–text-3);font-style:normal;letter-spacing:.07em;margin-bottom:5px;font-family:‘DM Sans’,sans-serif}
.entries-col{display:flex;flex-direction:column;gap:9px}

/* Archive */
.arch-hd{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.arch-title{font-family:‘Cormorant Garamond’,serif;font-size:30px;font-weight:400}
.arch-count{font-size:12px;color:var(–text-3);margin-left:auto}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px;width:100%}
.fpill{display:inline-flex;align-items:center;gap:5px;background:var(–surface);border:1px solid var(–border-2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(–text-2)}
.fpill button{background:none;border:none;color:var(–text-3);cursor:pointer;font-size:13px;line-height:1;padding:0;margin-left:2px;transition:color .2s}
.fpill button:hover{color:var(–red)}
.arch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:9px}

/* Entry Card */
.entry-card{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.entry-card::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;background:var(–cat-clr,var(–accent));border-radius:12px 0 0 12px}
.entry-card:hover{border-color:var(–border-2);transform:translateY(-1px)}
.ec-top{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.ec-badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:4px}
.ec-time{font-size:11px;color:var(–text-3);margin-left:auto;white-space:nowrap}
.ec-title{font-family:‘Cormorant Garamond’,serif;font-size:19px;font-weight:400;line-height:1.2;margin-bottom:2px}
.ec-sub{font-size:12px;color:var(–text-2);margin-bottom:6px}
.ec-stars{color:var(–accent);font-size:12px;letter-spacing:1px;margin-bottom:5px}
.ec-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag-chip{background:var(–surface-2);border:1px solid var(–border);border-radius:4px;padding:2px 7px;font-size:10px;color:var(–text-3);letter-spacing:.04em}
.ec-photos{display:flex;gap:5px;margin-bottom:6px;overflow:hidden}
.ec-thumb{width:52px;height:52px;object-fit:cover;border-radius:6px;flex-shrink:0}
.ec-more-ph{width:52px;height:52px;background:var(–surface-2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(–text-3);flex-shrink:0}
.ec-notes{font-size:12px;color:var(–text-2);line-height:1.65;font-style:italic}

/* Empty */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:var(–text-3)}
.empty-glyph{font-family:‘Cormorant Garamond’,serif;font-size:64px;font-weight:300;font-style:italic;opacity:.16;margin-bottom:18px;line-height:1}
.empty-state p{font-size:13px;line-height:1.7;max-width:280px}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(–accent);border:none;color:#0c0b09;font-size:26px;font-weight:200;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px var(–accent-glow);transition:transform .2s,box-shadow .2s;z-index:100;line-height:1}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 36px var(–accent-glow)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(12,11,9,.9);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(–surface);border:1px solid var(–border-2);border-radius:20px 20px 0 0;width:100%;max-width:660px;max-height:94vh;overflow-y:auto;padding:22px 26px 30px;transform:translateY(40px);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.overlay.open .modal{transform:translateY(0)}
.mhandle{width:32px;height:3px;background:var(–border-2);border-radius:2px;margin:0 auto 20px}
.mtitle{font-family:‘Cormorant Garamond’,serif;font-size:26px;font-weight:400;margin-bottom:3px}
.msub{font-size:12px;color:var(–text-2);margin-bottom:20px}

/* Cat Picker */
.cpick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.cpick-card{background:var(–surface-2);border:1px solid var(–border);border-radius:11px;padding:18px 12px;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:10px}
.cpick-card:hover{border-color:var(–cc);background:color-mix(in srgb,var(–cc) 10%,var(–surface-2))}
.cpick-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cpick-label{font-size:11px;color:var(–text-2);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* Form */
.back-btn{background:none;border:none;color:var(–text-3);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0;margin-bottom:14px;transition:color .2s;font-family:‘DM Sans’,sans-serif;letter-spacing:.04em}
.back-btn:hover{color:var(–text-2)}
.form-cat-badge{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.frow{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.frow label{font-size:9px;color:var(–text-3);letter-spacing:.12em;text-transform:uppercase}
input[type=text],input[type=number],textarea{background:var(–surface-2);border:1px solid var(–border);border-radius:7px;padding:9px 12px;color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:16px;outline:none;transition:border-color .2s;width:100%}
input:focus,textarea:focus{border-color:var(–accent)}
textarea{resize:vertical;min-height:140px;line-height:1.75;font-size:16px}

/* Tag chip input */
.tag-input-wrap{min-height:40px;background:var(–surface-2);border:1px solid var(–border);border-radius:7px;padding:5px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;cursor:text;transition:border-color .2s}
.tag-input-wrap:focus-within{border-color:var(–accent)}
.tci{background:var(–accent-dim);border:1px solid rgba(197,163,94,.3);border-radius:4px;padding:2px 6px;font-size:11px;color:var(–accent);display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.tci button{background:none;border:none;color:var(–accent);cursor:pointer;font-size:13px;line-height:1;padding:0;opacity:.6;transition:opacity .15s}
.tci button:hover{opacity:1}
.tag-type-input{border:none;background:transparent;outline:none;color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:16px;min-width:80px;flex:1;padding:2px 4px}
.tag-type-input::placeholder{color:var(–text-3)}

/* Stars */
.star-row{display:flex;gap:4px;padding-top:2px}
.sb{background:none;border:none;color:var(–text-3);font-size:20px;cursor:pointer;padding:0;line-height:1;transition:color .15s,transform .1s}
.sb:hover,.sb.lit{color:var(–accent)}
.sb:hover{transform:scale(1.15)}

/* Photos */
.photo-upload-area{border:1px dashed var(–border-2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.photo-upload-area:hover{border-color:var(–accent);background:var(–accent-dim)}
.photo-upload-label{font-size:12px;color:var(–text-3);cursor:pointer;display:block}
.photo-upload-label span{color:var(–accent)}
#photoInput{display:none}
.photos-preview{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.ph-prev{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;flex-shrink:0}
.ph-prev img{width:100%;height:100%;object-fit:cover}
.ph-del{position:absolute;top:3px;right:3px;background:rgba(12,11,9,.8);border:none;border-radius:50%;width:18px;height:18px;font-size:11px;color:var(–text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1;padding:0}
.ph-del:hover{background:var(–red);color:#fff}

/* Actions */
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(–border)}
.btn{padding:9px 20px;border-radius:7px;border:none;font-family:‘DM Sans’,sans-serif;font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:.04em}
.btn-g{background:transparent;color:var(–text-2);border:1px solid var(–border)}
.btn-g:hover{border-color:var(–border-2);color:var(–text)}
.btn-p{background:var(–accent);color:#0c0b09;font-weight:500}
.btn-p:hover{filter:brightness(1.08)}
.btn-d{background:transparent;color:var(–red);border:1px solid transparent;margin-right:auto}
.btn-d:hover{border-color:var(–red);background:rgba(197,94,94,.08)}

/* Detail */
.det-badge{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.det-title{font-family:‘Cormorant Garamond’,serif;font-size:30px;font-weight:400;line-height:1.15;margin-bottom:4px}
.det-sub{font-size:14px;color:var(–text-2);margin-bottom:12px}
.det-stars{color:var(–accent);font-size:16px;letter-spacing:2px;margin-bottom:12px}
.det-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.det-tag{background:var(–accent-dim);border:1px solid rgba(197,163,94,.25);border-radius:5px;padding:3px 9px;font-size:11px;color:var(–accent)}
.det-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:16px}
.det-gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:zoom-in;transition:opacity .2s}
.det-gallery img:hover{opacity:.85}
.det-divider{border:none;border-top:1px solid var(–border);margin:14px 0}
.det-notes{font-size:13px;color:var(–text-2);line-height:1.85;white-space:pre-wrap}
.det-meta{font-size:11px;color:var(–text-3);display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}

/* Cat Manager */
.cat-mgr-list{display:flex;flex-direction:column;gap:4px;margin-bottom:20px;max-height:260px;overflow-y:auto}
.cat-mgr-item{display:flex;align-items:center;gap:9px;background:var(–surface-2);border-radius:8px;padding:9px 12px;border:1px solid var(–border)}
.cat-mgr-icon{font-size:17px;line-height:1;flex-shrink:0}
.cat-mgr-name{font-size:13px;flex:1}
.cat-mgr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-del-btn{background:none;border:none;color:var(–text-3);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;transition:all .2s}
.cat-del-btn:hover{color:var(–red);background:rgba(197,94,94,.1)}
.new-cat-form{background:var(–surface-2);border:1px solid var(–border);border-radius:10px;padding:14px}
.ncf-title{font-size:9px;color:var(–text-3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.ncf-row{display:grid;grid-template-columns:52px 1fr;gap:9px;margin-bottom:9px}
.emoji-inp{text-align:center;font-size:22px;padding:6px;background:var(–surface);border:1px solid var(–border);border-radius:7px;outline:none;cursor:pointer;width:52px}
.color-swatches{display:flex;flex-wrap:wrap;gap:5px;padding-top:4px}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:var(–text)}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(12,11,9,.97);z-index:400;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(–border-2);border-radius:2px}

/* BOTTOM NAV — mobile only */
.bottom-nav{display:none}
@media(max-width:640px){
aside{display:none}
main{padding:16px;padding-bottom:80px}
.cpick-grid{grid-template-columns:repeat(2,1fr)}
.search-wrap{max-width:none}
.view-tabs{display:none}
.fab{bottom:72px}
.bottom-nav{
display:flex;position:fixed;bottom:0;left:0;right:0;
height:58px;background:var(–surface);border-top:1px solid var(–border);
z-index:150;padding-bottom:env(safe-area-inset-bottom);
}
.bnav-btn{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:4px;background:none;border:none;cursor:pointer;
color:var(–text-3);font-family:‘DM Sans’,sans-serif;
font-size:9px;letter-spacing:.08em;text-transform:uppercase;
transition:color .2s;padding:6px 0;
}
.bnav-btn.active{color:var(–accent)}
.bnav-icon{width:20px;height:20px;display:block}
/* Mobile menu modal */
.mob-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.mob-menu-card{background:var(–surface-2);border:1px solid var(–border);border-radius:11px;padding:16px 12px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s;color:var(–text-3)}
.mob-menu-card:hover{border-color:var(–border-2);color:var(–text-2)}
.mob-menu-label{font-size:11px;color:var(–text-2);letter-spacing:.06em;text-transform:uppercase}
/* Mobile cal in modal */
.mob-cal{padding:4px 0 16px}
}
</style>

</head>
<body>

<header>
  <div class="logo">diario<em>.</em></div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="white"><circle cx="5.5" cy="5.5" r="4.5" stroke-width="1.2"/><line x1="9" y1="9" x2="12" y2="12" stroke-width="1.2" stroke-linecap="round"/></svg>
    <input id="searchInput" type="text" placeholder="Cerca tra tutte le voci…" oninput="onSearch()">
  </div>
  <div class="spacer"></div>
  <div class="view-tabs">
    <button class="vtab active" id="tabDay" onclick="setView('day')">Giorno</button>
    <button class="vtab" id="tabArch" onclick="setView('archive')">Archivio</button>
  </div>
</header>

<div class="app-body">
  <aside>
    <div class="cal-wrap">
      <div class="cal-top">
        <button class="cal-nav" onclick="prevMonth()">‹</button>
        <span class="cal-month-label" id="calLabel"></span>
        <button class="cal-nav" onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

<script>
// ─── DEFAULTS ──────────────────────────────────────────────────────────────
const DEFAULT_CATS=[
  {id:'film',name:'Film',icon:'🎬',color:'#d4735a'},
  {id:'music',name:'Musica',icon:'🎵',color:'#6a9fd4'},
  {id:'book',name:'Libro',icon:'📖',color:'#52bfa8'},
  {id:'podcast',name:'Podcast',icon:'🎙',color:'#a87ad4'},
  {id:'news',name:'Notizia',icon:'📰',color:'#d4bc52'},
  {id:'game',name:'Gioco',icon:'🎮',color:'#d45a92'},
  {id:'experience',name:'Esperienza',icon:'✦',color:'#52d478'},
  {id:'excursion',name:'Escursione',icon:'⛰',color:'#d4a352'},
];
const SWATCHES=[
  '#d4735a','#d4a352','#d4bc52','#a8d452',
  '#52d478','#52bfa8','#52a8d4','#6a9fd4',
  '#7a6ad4','#a87ad4','#d45a92','#d45a5a',
  '#c5a35e','#8a7a5a','#9aa8a8','#a8b8c8',
];
const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const WDS=['L','M','M','G','V','S','D'];

// ─── STATE ─────────────────────────────────────────────────────────────────
const S={view:'day',date:todayStr(),calY:new Date().getFullYear(),calM:new Date().getMonth(),archCat:null,archTag:null,search:'',cats:[],entries:[]};
let pendingPhotos=[];
let newCatColor=SWATCHES[0];

function todayStr(){return new Date().toISOString().slice(0,10)}
function load(){
  try{S.cats=JSON.parse(localStorage.getItem('diario_cats_v2')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS))}catch{S.cats=JSON.parse(JSON.stringify(DEFAULT_CATS))}
  try{S.entries=JSON.parse(localStorage.getItem('diario_v2')||'[]')}catch{S.entries=[]}
}
function saveCats(){localStorage.setItem('diario_cats_v2',JSON.stringify(S.cats))}
function saveEntries(){
  try{localStorage.setItem('diario_v2',JSON.stringify(S.entries))}
  catch{alert('Spazio di archiviazione quasi esaurito. Esporta i dati e cancella alcune voci o foto.')}
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render(){renderCal();renderCatNav();renderTagsCloud();renderMain()}

function renderCal(){
  document.getElementById('calLabel').textContent=`${MONTHS[S.calM]} ${S.calY}`;
  const edates=new Set(S.entries.map(e=>e.date));
  const ts=todayStr();
  const first=new Date(S.calY,S.calM,1);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  const days=new Date(S.calY,S.calM+1,0).getDate();
  let h=WDS.map(w=>`<div class="cal-wd">${w}</div>`).join('');
  for(let i=0;i<dow;i++)h+=`<div class="cd empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${S.calY}-${pad(S.calM+1)}-${pad(d)}`;
    const cl=['cd',ds===ts?'today':'',ds===S.date?'selected':'',edates.has(ds)?'has-e':''].filter(Boolean).join(' ');
    h+=`<div class="${cl}" onclick="selDate('${ds}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=h;
}

function renderCatNav(){
  const counts={};
  S.entries.forEach(e=>{counts[e.cat]=(counts[e.cat]||0)+1});
  document.getElementById('catNav').innerHTML=S.cats.map(c=>`
    <div class="nav-item ${S.archCat===c.id&&S.view==='archive'?'active':''}" onclick="selCat('${c.id}')">
      <div class="nav-dot" style="background:${c.color}"></div>
      <span class="nav-name">${esc(c.name)}</span>
      <span class="nav-count">${counts[c.id]||0}</span>
    </div>`).join('');
}

function renderTagsCloud(){
  const tc={};
  S.entries.forEach(e=>(e.tags||[]).forEach(t=>{tc[t]=(tc[t]||0)+1}));
  const tags=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  document.getElementById('tagsCloud').innerHTML=tags.length
    ?tags.map(([t,n])=>`<span class="tag-chip-sm ${S.archTag===t&&S.view==='archive'?'active':''}" onclick="selTag('${escAttr(t)}')" title="${n}">#${esc(t)}</span>`).join('')
    :'<span style="font-size:11px;color:var(--text-3);padding:0 4px">—</span>';
}

function renderMain(){
  document.getElementById('tabDay').classList.toggle('active',S.view==='day');
  document.getElementById('tabArch').classList.toggle('active',S.view==='archive');
  S.view==='day'?renderDay():renderArch();
}

function renderDay(){
  const d=new Date(S.date+'T12:00:00');
  let entries=S.entries.filter(e=>e.date===S.date).sort((a,b)=>b.ts-a.ts);
  if(S.search)entries=entries.filter(matchesSearch);
  let h=`<div class="day-hd">
    <div class="day-eyebrow">${d.toLocaleDateString('it-IT',{weekday:'long'})}</div>
    <div class="day-big"><span class="day-num">${d.getDate()}</span>
    <div class="day-rest">${d.toLocaleDateString('it-IT',{month:'long',year:'numeric'})}</div></div></div>`;
  if(!entries.length){
    h+=`<div class="empty-state"><div class="empty-glyph">∅</div><p>${S.search?'Nessun risultato.':'Nessuna voce per questo giorno.<br>Premi <strong>+</strong> per aggiungere.'}</p></div>`;
  }else{
    h+=`<div class="entries-col">${entries.map(e=>cardHtml(e,false)).join('')}</div>`;
  }
  document.getElementById('mainArea').innerHTML=h;
}

function renderArch(){
  let entries=[...S.entries].sort((a,b)=>b.ts-a.ts);
  const pills=[];
  if(S.archCat){const c=getcat(S.archCat);if(c){entries=entries.filter(e=>e.cat===S.archCat);pills.push({l:`${c.icon} ${c.name}`,f:'cat'})}}
  if(S.archTag){entries=entries.filter(e=>(e.tags||[]).includes(S.archTag));pills.push({l:`#${S.archTag}`,f:'tag'})}
  if(S.search){entries=entries.filter(matchesSearch);pills.push({l:`"${S.search}"`,f:'search'})}
  const title=S.archCat?esc(getcat(S.archCat)?.name||''):S.archTag?`#${esc(S.archTag)}`:"Tutto l'archivio";
  let h=`<div class="arch-hd">
    <div class="arch-title">${title}</div>
    <div class="arch-count">${entries.length} ${entries.length===1?'voce':'voci'}</div>
    ${pills.length?`<div class="filter-pills">${pills.map(p=>`<span class="fpill">${esc(p.l)}<button onclick="clearFilter('${p.f}')">×</button></span>`).join('')}</div>`:''}</div>`;
  h+=entries.length
    ?`<div class="arch-grid">${entries.map(e=>cardHtml(e,true)).join('')}</div>`
    :`<div class="empty-state"><div class="empty-glyph">∅</div><p>Nessuna voce trovata.</p></div>`;
  document.getElementById('mainArea').innerHTML=h;
}

function cardHtml(e,showDate){
  const c=getcat(e.cat)||{icon:'?',name:'?',color:'#888'};
  const time=new Date(e.ts).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  const stars=e.rating?'★'.repeat(e.rating)+'☆'.repeat(5-e.rating):'';
  const tags=(e.tags||[]).slice(0,5).map(t=>`<span class="tag-chip">#${esc(t)}</span>`).join('');
  const moreT=(e.tags||[]).length>5?`<span class="tag-chip">+${e.tags.length-5}</span>`:'';
  let photos='';
  if((e.photos||[]).length){
    const show=e.photos.slice(0,3),more=e.photos.length-3;
    photos=`<div class="ec-photos">${show.map(p=>`<img class="ec-thumb" src="${p}" loading="lazy">`).join('')}${more>0?`<div class="ec-more-ph">+${more}</div>`:''}</div>`;
  }
  return `<div class="entry-card" style="--cat-clr:${c.color}" onclick="openDetail('${e.id}')">
    <div class="ec-top">
      <span class="ec-badge" style="color:${c.color}">${esc(c.name)}</span>
      <span class="ec-time">${showDate?fmtDate(e.date):time}</span>
    </div>
    <div class="ec-title">${esc(e.title||'—')}</div>
    ${e.subtitle?`<div class="ec-sub">${esc(e.subtitle)}</div>`:''}
    ${stars?`<div class="ec-stars">${stars}</div>`:''}
    ${(e.tags||[]).length?`<div class="ec-tags">${tags}${moreT}</div>`:''}
    ${photos}
    ${e.notes?`<div class="ec-notes">${esc(e.notes.slice(0,220))}${e.notes.length>220?'…':''}</div>`:''}
  </div>`;
}

const matchesSearch=e=>{
  const q=S.search.toLowerCase();
  return[e.title,e.subtitle,e.notes,...(e.tags||[])].some(f=>f&&String(f).toLowerCase().includes(q));
};

// ─── NAV ───────────────────────────────────────────────────────────────────
function setView(v){
  S.view=v;S.archCat=null;S.archTag=null;render();
  // sync bottom nav
  const bd=document.getElementById('bnavDay');
  const ba=document.getElementById('bnavArch');
  if(bd&&ba){bd.classList.toggle('active',v==='day');ba.classList.toggle('active',v==='archive')}
}

function openMobileMenu(){
  showModal(`
    <div class="mtitle">Menu</div>
    <div class="mob-menu-grid">
      <div class="mob-menu-card" onclick="closeModal();openCatManager()">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="11" cy="11" r="3"/><circle cx="11" cy="11" r="8"/><line x1="11" y1="3" x2="11" y2="1"/><line x1="11" y1="21" x2="11" y2="19"/><line x1="3" y1="11" x2="1" y2="11"/><line x1="21" y1="11" x2="19" y2="11"/></svg>
        <div class="mob-menu-label">Categorie</div>
      </div>
      <div class="mob-menu-card" onclick="closeModal();openMobileCal()">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="3" y="4" width="16" height="15" rx="2"/><line x1="3" y1="9" x2="19" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="14" y1="2" x2="14" y2="6"/></svg>
        <div class="mob-menu-label">Calendario</div>
      </div>
      <div class="mob-menu-card" onclick="closeModal();openMobileTags()">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7l9 9-7 7L3 10V3z"/><circle cx="7.5" cy="7.5" r="1"/></svg>
        <div class="mob-menu-label">Tag</div>

      </div>

    <div class="form-actions"><button class="btn btn-g" onclick="closeModal()">Chiudi</button></div>`);
}

function openMobileCal(){
  // Build calendar in modal
  const ts=todayStr();
  const edates=new Set(S.entries.map(e=>e.date));
  const first=new Date(S.calY,S.calM,1);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  const days=new Date(S.calY,S.calM+1,0).getDate();
  let grid=WDS.map(w=>`<div class="cal-wd">${w}</div>`).join('');
  for(let i=0;i<dow;i++)grid+=`<div class="cd empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${S.calY}-${pad(S.calM+1)}-${pad(d)}`;
    const cl=['cd',ds===ts?'today':'',ds===S.date?'selected':'',edates.has(ds)?'has-e':''].filter(Boolean).join(' ');
    grid+=`<div class="${cl}" onclick="selDateMob('${ds}')">${d}</div>`;
  }
  showModal(`
    <div class="mtitle" style="margin-bottom:16px">Calendario</div>
    <div class="mob-cal">
      <div class="cal-top" style="margin-bottom:14px">
        <button class="cal-nav" onclick="prevMonthMob()">‹</button>
        <span class="cal-month-label" id="mobCalLabel">${MONTHS[S.calM]} ${S.calY}</span>
        <button class="cal-nav" onclick="nextMonthMob()">›</button>
      </div>
      <div class="cal-grid" id="mobCalGrid">${grid}</div>
    </div>
    <div class="form-actions"><button class="btn btn-g" onclick="closeModal()">Chiudi</button></div>`);
}

function selDateMob(ds){S.date=ds;S.view='day';closeModal();render();const bd=document.getElementById('bnavDay');const ba=document.getElementById('bnavArch');if(bd)bd.classList.add('active');if(ba)ba.classList.remove('active')}
function prevMonthMob(){if(S.calM===0){S.calM=11;S.calY--}else S.calM--;openMobileCal()}
function nextMonthMob(){if(S.calM===11){S.calM=0;S.calY++}else S.calM++;openMobileCal()}

function openMobileTags(){
  const tc={};
  S.entries.forEach(e=>(e.tags||[]).forEach(t=>{tc[t]=(tc[t]||0)+1}));
  const tags=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  showModal(`
    <div class="mtitle">Tag</div>
    <div class="msub">${tags.length} tag usati</div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;padding-bottom:20px">
      ${tags.length?tags.map(([t,n])=>`<span class="tag-chip-sm" onclick="selTagMob('${escAttr(t)}')" style="font-size:13px;padding:5px 12px">#${esc(t)} <span style="opacity:.5;margin-left:3px">${n}</span></span>`).join(''):'<span style="color:var(--text-3);font-size:13px">Nessun tag ancora.</span>'}
    </div>
    <div class="form-actions"><button class="btn btn-g" onclick="closeModal()">Chiudi</button></div>`);
}
function selTagMob(t){closeModal();selTag(t)}
function selDate(ds){S.date=ds;S.view='day';render()}
function selCat(k){S.archCat=k;S.archTag=null;S.view='archive';render()}
function selTag(t){S.archTag=t;S.archCat=null;S.view='archive';render()}
function prevMonth(){if(S.calM===0){S.calM=11;S.calY--}else S.calM--;renderCal()}
function nextMonth(){if(S.calM===11){S.calM=0;S.calY++}else S.calM++;renderCal()}
function onSearch(){S.search=document.getElementById('searchInput').value.trim();renderMain()}
function clearFilter(f){if(f==='cat')S.archCat=null;else if(f==='tag')S.archTag=null;else{S.search='';document.getElementById('searchInput').value=''}render()}

// ─── MODAL ─────────────────────────────────────────────────────────────────
function showModal(html){document.getElementById('mContent').innerHTML=html;document.getElementById('overlay').classList.add('open')}
function closeModal(){document.getElementById('overlay').classList.remove('open');pendingPhotos=[]}

}

function formTitle(cat){
return{film:‘Che film hai visto?’,music:‘Cosa hai ascoltato?’,book:‘Cosa hai letto?’,podcast:‘Che podcast hai sentito?’,news:‘Che notizia ti ha colpito?’,game:‘Che gioco hai giocato?’,experience:‘Che esperienza hai vissuto?’,excursion:‘Dove sei andato?’}[cat]||‘Nuova voce’;
}

function setStar(v){
document.getElementById(‘fRating’).value=v;
document.querySelectorAll(’.sb’).forEach(b=>b.classList.toggle(‘lit’,parseInt(b.dataset&&b.dataset.v||b.textContent)<=v||(b.onclick&&b.onclick.toString().includes(`(${v})`))));
// simpler: re-read buttons by order
document.querySelectorAll(’.star-row .sb’).forEach((b,i)=>b.classList.toggle(‘lit’,i<v));
}

function tagKeydown(e){
if(e.key===‘Enter’||e.key===’,’||e.key===’;’){
e.preventDefault();
const val=e.target.value.replace(/[,;]/g,’’).trim().toLowerCase();
if(val)addTagChip(val);
e.target.value=’’;
}else if(e.key===‘Backspace’&&!e.target.value){
const chips=[…document.querySelectorAll(’#tagWrap .tci’)];
if(chips.length)chips[chips.length-1].remove();
}
}
function addTagChip(tag){
const wrap=document.getElementById(‘tagWrap’);
const existing=[…wrap.querySelectorAll(’.tci’)].map(el=>el.childNodes[0].textContent.slice(1));
if(existing.includes(tag))return;
const sp=document.createElement(‘span’);sp.className=‘tci’;
sp.innerHTML=`#${esc(tag)}<button type="button" onclick="removeTag(this)">×</button>`;
wrap.insertBefore(sp,document.getElementById(‘tagType’));
}
function removeTag(btn){btn.parentElement.remove()}
function getTags(){return[…document.querySelectorAll(’#tagWrap .tci’)].map(el=>el.childNodes[0].textContent.trim().slice(1)).filter(Boolean)}

async function handlePhotos(evt){
for(const f of evt.target.files){const b64=await resizeImage(f);if(b64)pendingPhotos.push({b64})}
evt.target.value=’’;renderPhotoPrev();
}
function renderPhotoPrev(){
const p=document.getElementById(‘photosPrev’);if(!p)return;
p.innerHTML=pendingPhotos.map((ph,i)=>`<div class="ph-prev"><img src="${ph.b64}" loading="lazy"><button class="ph-del" onclick="removePhoto(${i})" type="button">×</button></div>`).join(’’);
}
function removePhoto(i){pendingPhotos.splice(i,1);renderPhotoPrev()}

function resizeImage(file,maxDim=1100,quality=0.72){
return new Promise(res=>{
const img=new Image(),url=URL.createObjectURL(file);
img.onload=()=>{
let w=img.width,h=img.height;
if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim}else{w=Math.round(w*maxDim/h);h=maxDim}}
const cv=document.createElement(‘canvas’);cv.width=w;cv.height=h;
cv.getContext(‘2d’).drawImage(img,0,0,w,h);
URL.revokeObjectURL(url);res(cv.toDataURL(‘image/jpeg’,quality));
};
img.onerror=()=>{URL.revokeObjectURL(url);res(null)};
img.src=url;
});
}

function submitForm(catId,editingId){
const title=document.getElementById(‘fTitle’).value.trim();
if(!title){alert(‘Il titolo è obbligatorio.’);return}
const now=Date.now();
const orig=editingId?S.entries.find(e=>e.id===editingId):null;
const entry={
id:editingId||(now.toString(36)+Math.random().toString(36).slice(2)),
date:S.date,cat:catId,
title,
subtitle:document.getElementById(‘fSub’).value.trim(),
rating:parseInt(document.getElementById(‘fRating’).value)||0,
tags:getTags(),
photos:pendingPhotos.filter(p=>p.b64).map(p=>p.b64),
notes:document.getElementById(‘fNotes’).value.trim(),
ts:orig?orig.ts:now,
edited:editingId?now:null,
};
if(editingId)S.entries=S.entries.map(e=>e.id===editingId?entry:e);
else S.entries.push(entry);
saveEntries();pendingPhotos=[];closeModal();S.view=‘day’;render();
}

// ─── DETAIL ────────────────────────────────────────────────────────────────
function openDetail(id){
const e=S.entries.find(x=>x.id===id);if(!e)return;
const c=getcat(e.cat)||{icon:’?’,name:’?’,color:’#888’};
const time=new Date(e.ts).toLocaleTimeString(‘it-IT’,{hour:‘2-digit’,minute:‘2-digit’});
const stars=e.rating?‘★’.repeat(e.rating)+‘☆’.repeat(5-e.rating):’’;
const gallery=(e.photos||[]).map((p,i)=>`<img src="${p}" data-i="${i}" loading="lazy">`).join(’’);
showModal(` <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px"> <div class="det-badge" style="color:${c.color}">${esc(c.name)}</div> <button class="sec-btn" onclick="editEntry('${e.id}')">Modifica</button> </div> <div class="det-title">${esc(e.title||'—')}</div> ${e.subtitle?`<div class="det-sub">${esc(e.subtitle)}</div>`:''} ${stars?`<div class="det-stars">${stars}</div>`:''} ${(e.tags||[]).length?`<div class="det-tags">${e.tags.map(t=>`<span class="det-tag">#${esc(t)}</span>`).join(’’)}</div>`:''} ${gallery?`<div class="det-gallery" id="detGallery">${gallery}</div><hr class="det-divider">`:''} ${e.notes?`<div class="det-notes">${esc(e.notes)}</div><hr class="det-divider">`:''} <div class="det-meta"> <span>${fmtDate(e.date)} · ${time}</span> ${e.edited?`<span>Modificato ${new Date(e.edited).toLocaleDateString(‘it-IT’)}</span>`:''} </div> <div class="form-actions"> <button class="btn btn-d" onclick="delEntry('${e.id}')">Elimina voce</button> <button class="btn btn-g" onclick="closeModal()">Chiudi</button> </div>`);
// Bind gallery lightbox
setTimeout(()=>{
const imgs=document.querySelectorAll(’#detGallery img’);
imgs.forEach((img,i)=>{img.onclick=()=>openLightbox(e.photos[i])});
},0);
}

function editEntry(id){const e=S.entries.find(x=>x.id===id);if(e)openForm(e.cat,e)}
function delEntry(id){
const e=S.entries.find(x=>x.id===id);if(!e)return;
const c=getcat(e.cat)||{color:’#888’};
showModal(` <div class="mtitle">Elimina voce</div> <div class="msub" style="margin-bottom:18px">Stai per eliminare permanentemente:</div> <div style="background:var(--surface-2);border:1px solid var(--border);border-left:3px solid ${c.color};border-radius:8px;padding:14px 16px;margin-bottom:24px"> <div style="font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:3px">${esc(e.title||'—')}</div> <div style="font-size:12px;color:var(--text-3)">${fmtDate(e.date)}</div> </div> <p style="font-size:12px;color:var(--text-3);margin-bottom:20px">Questa azione non può essere annullata.</p> <div class="form-actions"> <button class="btn btn-g" onclick="openDetail('${id}')">Annulla</button> <button class="btn btn-d" style="border:1px solid var(--red);margin-right:0" onclick="confirmDelEntry('${id}')">Sì, elimina</button> </div>`);
}
function confirmDelEntry(id){
S.entries=S.entries.filter(e=>e.id!==id);
saveEntries();closeModal();render();
}

// ─── LIGHTBOX ──────────────────────────────────────────────────────────────
function openLightbox(src){document.getElementById(‘lbImg’).src=src;document.getElementById(‘lightbox’).classList.add(‘open’)}
function closeLightbox(){document.getElementById(‘lightbox’).classList.remove(‘open’)}

// ─── CAT MANAGER ───────────────────────────────────────────────────────────
function openCatManager(){
newCatColor=SWATCHES[0];
showModal(` <div class="mtitle">Gestisci categorie</div> <div class="msub">Aggiungi nuove categorie o elimina quelle esistenti.</div> <div class="cat-mgr-list" id="catMgrList">${catMgrListHtml()}</div> <div class="new-cat-form"> <div class="ncf-title">Nuova categoria</div> <div class="ncf-row"> <input type="text" class="emoji-inp" id="ncIcon" placeholder="🗒" maxlength="4"> <input type="text" id="ncName" placeholder="Nome della categoria…"> </div> <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px"> <label style="font-size:9px;color:var(--text-3);letter-spacing:.12em;text-transform:uppercase">Colore</label> <div class="color-swatches" id="colorSwatches"> ${SWATCHES.map((col,i)=>`<div class="cswatch${i===0?' sel':''}" style="background:${col}" onclick="pickColor('${col}',this)"></div>`).join('')} </div> </div> <button class="btn btn-p" style="width:100%" onclick="addCat()">+ Aggiungi</button> </div> <div class="form-actions"> <button class="btn btn-g" onclick="closeModal();render()">Chiudi</button> </div>`);
}
function catMgrListHtml(){
return S.cats.length?S.cats.map(c=>` <div class="cat-mgr-item"> <div class="cat-mgr-dot" style="background:${c.color}"></div> <span class="cat-mgr-name">${esc(c.name)}</span> <button class="cat-del-btn" onclick="deleteCat('${c.id}')" title="Elimina categoria">×</button> </div>`).join(’’)
:’<div style="text-align:center;padding:20px;font-size:12px;color:var(--text-3)">Nessuna categoria. Aggiungine una.</div>’;
}
function pickColor(col,el){newCatColor=col;document.querySelectorAll(’.cswatch’).forEach(s=>s.classList.remove(‘sel’));el.classList.add(‘sel’)}
function addCat(){
const icon=document.getElementById(‘ncIcon’).value.trim()||‘🗒’;
const name=document.getElementById(‘ncName’).value.trim();
if(!name){alert(‘Inserisci un nome.’);return}
S.cats.push({id:‘cat_’+Date.now().toString(36),name,icon,color:newCatColor});
saveCats();
document.getElementById(‘ncIcon’).value=’’;
document.getElementById(‘ncName’).value=’’;
document.getElementById(‘catMgrList’).innerHTML=catMgrListHtml();
}
function deleteCat(id){
const n=S.entries.filter(e=>e.cat===id).length;
const c=S.cats.find(x=>x.id===id);if(!c)return;
const warn=n>0?`<p style="font-size:12px;color:var(--text-3);margin-bottom:20px">Contiene <strong style="color:var(--text)">${n} voci</strong> che resteranno nell'archivio senza categoria.</p>`:’<p style="font-size:12px;color:var(--text-3);margin-bottom:20px">Questa azione non può essere annullata.</p>’;
showModal(` <div class="mtitle">Elimina categoria</div> <div class="msub" style="margin-bottom:18px">Stai per eliminare:</div> <div style="background:var(--surface-2);border:1px solid var(--border);border-left:3px solid ${c.color};border-radius:8px;padding:14px 16px;margin-bottom:16px"> <div style="font-size:15px">${esc(c.name)}</div> </div> ${warn} <div class="form-actions"> <button class="btn btn-g" onclick="openCatManager()">Annulla</button> <button class="btn btn-d" style="border:1px solid var(--red);margin-right:0" onclick="confirmDelCat('${id}')">Sì, elimina</button> </div>`);
}
function confirmDelCat(id){
S.cats=S.cats.filter(c=>c.id!==id);saveCats();
if(S.archCat===id)S.archCat=null;
openCatManager();renderCatNav();
}

// ─── EXPORT / IMPORT ───────────────────────────────────────────────────────
function exportData(){
const blob=new Blob([JSON.stringify({version:2,cats:S.cats,entries:S.entries},null,2)],{type:‘application/json’});
const url=URL.createObjectURL(blob);
const a=document.createElement(‘a’);a.href=url;a.download=`diario-${todayStr()}.json`;a.click();
URL.revokeObjectURL(url);
}
function importData(evt){
const file=evt.target.files[0];if(!file)return;
const r=new FileReader();
r.onload=e=>{
try{
const p=JSON.parse(e.target.result);
const cats=p.cats||[];const entries=p.entries||p;
if(!Array.isArray(entries))throw new Error();
const cids=new Set(S.cats.map(c=>c.id));
cats.forEach(c=>{if(!cids.has(c.id))S.cats.push(c)});
const eids=new Set(S.entries.map(x=>x.id));
let added=0;entries.forEach(en=>{if(!eids.has(en.id)){S.entries.push(en);added++}});
saveCats();saveEntries();render();
alert(`Importati ${added} nuovi elementi.`);
}catch{alert(‘File non valido.’)}
};
r.readAsText(file);evt.target.value=’’;
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function getcat(id){return S.cats.find(c=>c.id===id)}
function esc(s){return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’)}
function escAttr(s){return esc(s).replace(/’/g,’'’)}
function pad(n){return String(n).padStart(2,‘0’)}
function fmtDate(ds){if(!ds)return ‘’;return new Date(ds+‘T12:00:00’).toLocaleDateString(‘it-IT’,{day:‘numeric’,month:‘short’,year:‘numeric’})}

// ─── INIT ───────────────────────────────────────────────────────────────────
load();render();
</script>
